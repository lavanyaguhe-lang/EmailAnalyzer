<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PHISH-SHIELD | Forensic Analysis Terminal</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>

<div class="main-container"> <aside class="sidebar">
        <div class="logo" style="color: var(--accent); font-weight: bold; font-size: 1.5rem; margin-bottom: 3rem;">
            <i class='bx bxs-shield-x'></i> PHISH-SHIELD
        </div>
        <nav>
            <a href="/dashboard" class="nav-item" style="color: var(--accent); display: block; margin-bottom: 1rem;"><i class='bx bxs-terminal'></i> ANALYZER</a>
            <a href="/alerts" class="nav-item" style="color: var(--text-secondary); display: block; margin-bottom: 1rem;"><i class='bx bxs-bell-ring'></i> ALERT CENTER</a>
            <a href="/users" class="nav-item" style="color: var(--text-secondary); display: block; margin-bottom: 1rem;"><i class='bx bxs-user-detail'></i> USER MANAGEMENT</a>
            <a href="/about" class="nav-item" style="color: var(--text-secondary); display: block; margin-bottom: 1rem;"><i class='bx bxs-info-circle'></i> ABOUT SYSTEM</a>
            <a href="/system" class="nav-item" style="color: var(--text-secondary); display: block; margin-bottom: 1rem;"><i class='bx bxs-chip'></i> SYSTEM STATUS</a>
            <a href="/settings" class="nav-item" style="color: var(--text-secondary); display: block; margin-bottom: 1rem;"><i class='bx bxs-cog'></i> SETTINGS</a>
            <a href="/logout" class="nav-item" style="color: var(--danger); display: block;"><i class='bx bxs-log-out'></i> TERMINATE</a>
        </nav>
    </aside>

    <main class="main-content">
        <header style="border-bottom: 1px solid var(--border); margin-bottom: 2rem; padding-bottom: 1rem;">
            <h1 style="letter-spacing: -1px;">FORENSIC TERMINAL</h1>
            <p style="color: var(--text-secondary); font-family: var(--font-mono); font-size: 0.8rem;">
                OPERATOR: {{ session['username'] }} | STATUS: <span style="color: var(--success);">ACTIVE</span>
            </p>
        </header>

        <div class="card">
            <h3>HEURISTIC SCAN ENGINE</h3>
            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <textarea name="email_content" style="width: 100%; background: #010409; color: var(--accent); border: 1px solid var(--accent); padding: 1rem; font-family: var(--font-mono);" rows="8" placeholder="PASTE RAW PAYLOAD..."></textarea>
                <button type="submit" style="margin-top: 1rem; background: var(--accent); border: none; padding: 10px 25px; font-weight: bold; cursor: pointer;">EXECUTE ANALYSIS</button>
            </form>
        </div>

        {% if result %}
        {% endif %}

    </main>
</div>
</body>
</html>
